<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末日華語：像素勇者遠征 RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --dark-bg: #0a0a0a;
            --node-size: 80px;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            margin: 0; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* CRT 掃描線效果 */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        #game-container {
            width: 95%; max-width: 950px; height: 680px;
            border: 4px solid var(--neon-green); position: relative;
            background: #111; box-shadow: 0 0 25px var(--neon-green);
            padding: 30px; box-sizing: border-box;
        }

        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 16px; text-shadow: 2px 2px var(--neon-pink); margin-bottom: 20px; }
        
        .btn {
            background: transparent; color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 10px 20px; margin: 8px;
            cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 9px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }

        .char-box { display: flex; gap: 15px; margin-bottom: 20px; }
        .char-card { border: 2px solid var(--neon-blue); padding: 8px; cursor: pointer; width: 120px; transition: 0.3s; font-size: 12px;}
        .char-card.selected { background: var(--neon-blue); color: black; transform: scale(1.05); }

        /* 地圖介面 */
        #map-path-container {
            width: 90%; height: 180px; 
            position: relative; margin-top: 50px;
            display: flex; align-items: flex-end; justify-content: space-between;
        }

        .path-line-base {
            position: absolute; bottom: 15px; left: 0; width: 100%; height: 4px;
            background: #333; z-index: 1;
        }

        .map-node {
            width: var(--node-size); height: 40px;
            border: 3px solid #444; background: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: bold; color: #666;
            position: relative; z-index: 5;
        }
        .map-node.completed { border-color: var(--neon-green); color: var(--neon-green); }
        .map-node.active { border-color: var(--neon-blue); color: var(--neon-blue); background: #001a1a; box-shadow: 0 0 15px var(--neon-blue); }
        
        /* 像素勇者 v2.0 */
        #player-avatar {
            width: 32px; height: 32px;
            position: absolute; bottom: 25px;
            z-index: 10;
            transition: left 1s linear;
            display: none;
        }

        .pixel-v2 {
            position: absolute; top: 0; left: 0;
            width: 4px; height: 4px;
            background: transparent;
            box-shadow: 
                12px 0px #666, 16px 0px #666,
                8px 4px #888, 12px 4px #fff, 16px 4px #888, 20px 4px #888,
                8px 8px #666, 12px 8px #666, 16px 8px #666, 20px 8px #666,
                12px 12px #edc9af, 16px 12px #edc9af,
                8px 16px #3366ff, 12px 16px #3366ff, 16px 16px #3366ff, 20px 16px #3366ff,
                4px 20px #3366ff, 8px 20px #fff, 12px 20px #3366ff, 16px 20px #fff, 20px 20px #3366ff, 24px 20px #3366ff,
                8px 24px #3366ff, 12px 24px #3366ff, 16px 24px #3366ff, 20px 24px #3366ff,
                8px 28px #000, 20px 28px #000;
        }

        @keyframes avatarIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        #player-avatar:not(.walking) { animation: avatarIdle 1s infinite ease-in-out; }

        /* 戰鬥畫面 */
        #battle-stats { width: 100%; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stat-bar { width: 45%; border: 1px solid var(--neon-pink); padding: 8px; font-size: 14px; }
        #timer-container { width: 100%; height: 10px; border: 1px solid #444; margin: 15px 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--neon-green); transition: width 0.1s linear; }
        #question-display { min-height: 120px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; padding: 0 20px;}
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 10px; }

    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>數位華語：像素勇者遠征</h1>
        <button class="btn" onclick="goToScreen('char-select')">INITIALIZE SYSTEM</button>
    </div>

    <div id="char-select" class="screen">
        <h3>選擇你的數位身份</h3>
        <div class="char-box">
            <div class="char-card" id="c1" onclick="selectChar('學生')">學生<br><small>智力+10</small></div>
            <div class="char-card" id="c2" onclick="selectChar('助教')">助教<br><small>技術+30</small></div>
            <div class="char-card" id="c3" onclick="selectChar('老師')">老師<br><small>經驗+50</small></div>
        </div>
        <h3>選擇挑戰難度</h3>
        <div style="display:flex">
            <button class="btn" onclick="setDiff('easy')">簡單《字謎》</button>
            <button class="btn" onclick="setDiff('normal')">普通《文化/成語》</button>
            <button class="btn" onclick="setDiff('hard')">困難《綜合混戰》</button>
        </div>
    </div>

    <div id="map-screen" class="screen">
        <h1 id="map-title">勇者前進路徑</h1>
        <div id="map-path-container">
            <div class="path-line-base"></div>
            <div id="player-avatar"><div class="pixel-v2"></div></div>
            <div class="map-node" id="node-0">開始</div>
            <div class="map-node" id="node-1">關卡 1</div>
            <div class="map-node" id="node-2">關卡 2</div>
            <div class="map-node" id="node-3">關卡 3</div>
            <div class="map-node" id="node-4">關卡 4</div>
            <div class="map-node" id="node-5">關卡 5</div>
            <div class="map-node" id="node-6">最終考驗</div>
        </div>
        <button class="btn" id="map-action-btn" style="margin-top: 50px;" onclick="startCurrentLevel()">進入節點</button>
    </div>

    <div id="battle-screen" class="screen">
        <div id="battle-stats">
            <div class="stat-bar" id="p-score">PLAYER: 0</div>
            <div class="stat-bar" id="ai-score" style="border-color: var(--neon-pink);">AI: 0</div>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div id="question-display"><h2 id="q-text">載入中...</h2></div>
        <div id="audio-ui" style="display:none"><button class="btn" onclick="playAudio()">🔊 播放音訊</button></div>
        <div class="options-grid" id="options-box"></div>
        <p id="feedback" style="margin-top:15px; font-weight:bold;"></p>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="result-msg">SESSION ENDED</h1>
        <div id="score-report" style="margin-bottom:30px"></div>
        <button class="btn" onclick="location.reload()">REBOOT</button>
    </div>
</div>

    ],
    audio: [
        {q:"聽音選出『小米酒』正確變調：", a:"ㄒㄧㄠˇ ㄇㄧˊ ㄐㄧㄡˇ", w:["ㄒㄧㄠˇ ㄇㄧˇ ㄐㄧㄡˇ", "ㄒㄧㄠˊ ㄇㄧˊ ㄐㄧㄡˇ"], text:"小米酒"},
        {q:"聽音選出『仍然』正確讀音：", a:"ㄖㄥˊ ㄖㄢˊ", w:["ㄌㄥˊ ㄌㄢˊ", "ㄖㄣˊ ㄖㄢˊ"], text:"仍然"},
        {q:"聽音選出『渲染』中「渲」的讀音：", a:"ㄒㄩㄢˋ", w:["ㄒㄩㄢ", "ㄒㄩㄢˇ"], text:"渲染"}
    ]
};

let state = {
    player: 0, ai: 0, level: 0, 
    difficulty: '', char: '',
    questions: [], qIdx: 0, timer: null, time: 15,
    nodePositions: []
};

function goToScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function selectChar(c) {
    state.char = c;
    document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected'));
    document.getElementById(c === '學生' ? 'c1' : (c === '助教' ? 'c2' : 'c3')).classList.add('selected');
}

function setDiff(d) {
    if(!state.char) return alert("請先選擇身份");
    state.difficulty = d;
    goToScreen('map-screen');
    setTimeout(initMapPositions, 150);
}

function initMapPositions() {
    state.nodePositions = [];
    const container = document.getElementById('map-path-container');
    const containerRect = container.getBoundingClientRect();
    for(let i=0; i<=6; i++) {
        const nodeRect = document.getElementById(`node-${i}`).getBoundingClientRect();
        state.nodePositions.push(nodeRect.left - containerRect.left + (nodeRect.width / 2) - 16); 
    }
    const avatar = document.getElementById('player-avatar');
    avatar.style.display = 'block';
    avatar.style.left = state.nodePositions[0] + "px";
    updateMapUI();
}

function updateMapUI() {
    for(let i=0; i<=6; i++) {
        let node = document.getElementById(`node-${i}`);
        node.className = 'map-node' + (i < state.level ? ' completed' : (i === state.level ? ' active' : ''));
    }
    document.getElementById('map-action-btn').innerText = 
        state.level === 0 ? "開始遠征" : (state.level <= 5 ? `進入關卡 ${state.level}` : "最後考驗");
}

function moveAvatarToLevel(targetLevel) {
    const avatar = document.getElementById('player-avatar');
    avatar.style.left = state.nodePositions[targetLevel] + "px";
    setTimeout(() => {
        state.level = targetLevel;
        updateMapUI();
    }, 1000);
}

function getRandQ(type) {
    const pool = RAW_QB[type];
    return pool[Math.floor(Math.random() * pool.length)];
}

function startCurrentLevel() {
    if(state.level === 0) { moveAvatarToLevel(1); return; }
    
    state.qIdx = 0;
    // 抽題邏輯
    if(state.level <= 5) {
        if(state.difficulty === 'easy') state.questions = [getRandQ('riddle')];
        else if(state.difficulty === 'normal') state.questions = [getRandQ(Math.random() > 0.5 ? 'culture' : 'idiom')];
        else state.questions = [getRandQ(Object.keys(RAW_QB)[Math.floor(Math.random()*4)])];
    } else {
        // 第六關抽5題綜合
        state.questions = [getRandQ('riddle'), getRandQ('culture'), getRandQ('idiom'), getRandQ('audio'), getRandQ('idiom')];
    }
    
    goToScreen('battle-screen');
    renderQuestion();
}

function renderQuestion() {
    let q = state.questions[state.qIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('feedback').innerText = "";
    document.getElementById('audio-ui').style.display = q.text ? 'block' : 'none';
    if(q.text) playAudio();
    
    let opts = [q.a, ...q.w].sort(() => 0.5 - Math.random());
    let html = ''; opts.forEach(o => html += `<button class="btn" onclick="answer('${o}')">${o}</button>`);
    document.getElementById('options-box').innerHTML = html;
    startTimer();
}

function answer(pick) {
    clearInterval(state.timer);
    let q = state.questions[state.qIdx];
    let isCorrect = (pick === q.a);
    state.player += isCorrect ? Math.round((state.time/15)*1000) : 0;
    state.ai += (Math.random() > 0.4 ? Math.floor(Math.random()*300 + 300) : 0);
    
    document.getElementById('p-score').innerText = `PLAYER: ${state.player}`;
    document.getElementById('ai-score').innerText = `AI: ${state.ai}`;
    document.getElementById('feedback').innerText = isCorrect ? "解碼成功！" : "系統錯誤！答案: " + q.a;
    document.getElementById('feedback').style.color = isCorrect ? 'var(--neon-green)' : 'red';

    setTimeout(() => {
        state.qIdx++;
        if(state.qIdx < state.questions.length) renderQuestion();
        else {
            if(state.level < 6) { goToScreen('map-screen'); setTimeout(() => moveAvatarToLevel(state.level + 1), 600); }
            else showResult();
        }
    }, 1500);
}

function startTimer() { 
    clearInterval(state.timer); state.time = 15; 
    state.timer = setInterval(() => { 
        state.time -= 0.1; 
        document.getElementById('timer-bar').style.width = (state.time/15*100) + "%"; 
        if(state.time <= 0) answer(null); 
    }, 100); 
}
function playAudio() { let q = state.questions[state.qIdx]; if(q.text) { let u = new SpeechSynthesisUtterance(q.text); u.lang = 'zh-TW'; u.rate = 0.8; window.speechSynthesis.speak(u); } }
function showResult() { goToScreen('result-screen'); let win = state.player >= state.ai; document.getElementById('result-msg').innerText = win ? "勝利：數據守護成功" : "失敗：AI 侵蝕系統"; document.getElementById('score-report').innerHTML = `玩家：${state.player} <br> AI：${state.ai}`; }
</script>
</body>
</html>
