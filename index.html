<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語 8-BIT 遠征：清新科幻實驗室</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 根據 Color Hunt 配色調整 (更扎實的 8-bit 色調) */
            --bg-dark: #25343F;      /* 深藍底色 */
            --text-light: #EAEFEF;   /* 淺灰白字 */
            --accent-blue: #BFC9D1;  /* 灰藍邊框/次要 */
            --highlight: #FF9B51;    /* 亮橘點綴 (AI/時間條) */
            --neon-green: #39FF14;   /* 經典螢光綠 (玩家/完成) */
            
            /* 調整節點大小以適應 8-bit 風格 */
            --node-size: 90px;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            /* 全面使用 8-bit 字體 */
            font-family: 'Press Start 2P', cursive;
            margin: 0; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            image-rendering: pixelated; /* 關鍵：讓瀏覽器強制以像素方式渲染 */
        }

        /* 8-bit 扎實掃描線 (取代柔和漸層) */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            /* 使用網點圖案模擬螢幕紋理 */
            background-image: 
                linear-gradient(0deg, rgba(0,0,0,0.1) 50%, transparent 50%),
                linear-gradient(90deg, rgba(0,0,0,0.05) 50%, transparent 50%);
            background-size: 2px 2px, 2px 2px; /* 像素級紋理 */
            z-index: 100; pointer-events: none;
            opacity: 0.8;
        }

        #game-container {
            width: 95%; max-width: 980px; height: 740px;
            /* 粗糙的像素邊框 */
            border: 6px solid var(--accent-blue); position: relative;
            background: var(--bg-dark); box-shadow: 8px 8px 0px rgba(0,0,0,0.5); /* 8-bit 硬陰影 */
            padding: 40px; box-sizing: border-box;
        }

        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        h1 { font-size: 28px; color: var(--neon-green); text-shadow: 4px 4px 0px #000; margin-bottom: 40px; line-height: 1.4; }
        h3 { font-size: 20px; color: var(--text-light); margin-bottom: 25px; line-height: 1.6; }

        /* 像素按鈕樣式 */
        .btn {
            background: #1a252d; color: var(--text-light);
            border: 4px solid var(--accent-blue);
            padding: 18px 30px; margin: 12px;
            cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 14px;
            transition: 0.2s;
            /* 像素邊框角落修飾 */
            box-shadow: inset -4px -4px 0px #0e1418, inset 4px 4px 0px rgba(255,255,255,0.1);
        }
        .btn:hover { background: var(--text-light); color: var(--bg-dark); border-color: var(--text-light); box-shadow: 8px 8px 0px rgba(0,0,0,0.5); }

        /* 角色卡片 (像素風格化) */
        .char-box { display: flex; gap: 20px; margin-bottom: 40px; }
        .char-card { 
            border: 4px solid var(--accent-blue); padding: 25px; cursor: pointer; 
            width: 170px; transition: 0.2s; font-size: 18px; font-weight: bold;
            background: #1a252d;
            box-shadow: inset -4px -4px 0px #0e1418;
        }
        .char-card small { font-size: 12px; color: var(--accent-blue); display: block; margin-top: 10px; }
        .char-card.selected { border-color: var(--neon-green); color: var(--neon-green); background: rgba(57, 255, 20, 0.05); }

        /* 地圖區域 (像素通路) */
        #map-path-container {
            width: 95%; height: 200px; position: relative; margin-top: 60px;
            display: flex; align-items: flex-end; justify-content: space-between;
        }
        .path-line-base { position: absolute; bottom: 20px; left: 0; width: 100%; height: 6px; background: var(--accent-blue); z-index: 1; opacity: 0.2; }
        
        .map-node {
            width: var(--node-size); height: 44px; 
            border: 4px solid #444; background: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: #555; position: relative; z-index: 5;
        }
        .map-node.completed { border-color: var(--neon-green); color: var(--neon-green); }
        .map-node.active { border-color: var(--highlight); color: var(--highlight); box-shadow: 0 0 0px var(--highlight); font-size: 12px; background: #1a252d;}
        
        /* 勇者小人 (沿用像素繪製，但縮小並調整色調) */
        #player-avatar { width: 32px; height: 32px; position: absolute; bottom: 25px; z-index: 10; transition: left 1s linear; display: none; }
        .pixel-v2 {
            position: absolute; width: 4px; height: 4px; background: transparent;
            /* 重新根據 8-bit 風格調整像素色彩，移除不協調的膚色 */
            box-shadow: 
                12px 0px var(--accent-blue), 16px 0px var(--accent-blue),
                8px 4px var(--accent-blue), 12px 4px #fff, 16px 4px var(--accent-blue), 20px 4px var(--accent-blue),
                8px 8px var(--accent-blue), 12px 8px var(--accent-blue), 16px 8px var(--accent-blue), 20px 8px var(--accent-blue),
                12px 12px var(--accent-blue), 16px 12px var(--accent-blue),
                8px 16px var(--highlight), 12px 16px var(--highlight), 16px 16px var(--highlight), 20px 16px var(--highlight),
                4px 20px var(--highlight), 8px 20px #fff, 12px 20px var(--highlight), 16px 20px #fff, 20px 20px var(--highlight), 24px 20px var(--highlight),
                10px 32px #000, 22px 32px #000;
        }

        /* 戰鬥介面 (大字像素) */
        #battle-stats { width: 100%; display: flex; justify-content: space-between; margin-bottom: 25px; }
        .stat-bar { width: 45%; border: 4px solid var(--accent-blue); padding: 18px; font-size: 18px; background: #1a252d; box-shadow: inset -4px -4px 0px #0e1418; }
        
        #question-display { min-height: 180px; display: flex; align-items: center; justify-content: center; padding: 25px; background: #1a252d; border: 4px solid var(--accent-blue); margin-bottom: 25px; }
        /* 放大題目字體，適合 8-bit */
        #q-text { font-size: 36px; line-height: 1.5; color: var(--text-light); text-shadow: 4px 4px 0px rgba(0,0,0,0.5); }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        /* 選項按鈕像素化 */
        .options-grid .btn { font-size: 24px; font-weight: bold; padding: 22px; border-width: 4px; font-family: sans-serif; } /* 選項字體最大化，使用 sans-serif 確保清晰 */
        .options-grid .btn:hover { background: var(--neon-green); color: var(--bg-dark); border-color: var(--neon-green); }

        /* 8-bit 時間條 */
        #timer-container { width: 100%; height: 12px; background: #000; margin: 15px 0; border: 2px solid var(--accent-blue); overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--highlight); transition: width 0.1s linear; }

        #feedback { font-size: 20px; margin-top: 25px; height: 30px; font-weight: bold; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1 style="font-size: 36px; color: var(--text-light);"><span style="color:var(--neon-green)">8-BIT</span> 華語勇者<br><span style="color:var(--highlight)">遠征實驗室</span></h1>
        <button class="btn" style="font-size: 20px;" onclick="goToScreen('char-select')">冒險開始</button>
    </div>

    <div id="char-select" class="screen">
        <h3>身 份 確 認</h3>
        <div class="char-box">
            <div class="char-card" id="c1" onclick="selectChar('學生')">學生<br><small>智力+10</small></div>
            <div class="char-card" id="c2" onclick="selectChar('助教')">助教<br><small>技術+30</small></div>
            <div class="char-card" id="c3" onclick="selectChar('老師')">老師<br><small>經驗+50</small></div>
        </div>
        <h3>難 度 規 劃</h3>
        <div style="display:flex">
            <button class="btn" onclick="setDiff('easy')">簡單《字謎》</button>
            <button class="btn" onclick="setDiff('normal')">普通《文化》</button>
            <button class="btn" onclick="setDiff('hard')">困難《成語》</button>
        </div>
    </div>

    <div id="map-screen" class="screen">
        <h3>數 據 通 路</h3>
        <div id="map-path-container">
            <div class="path-line-base"></div>
            <div id="player-avatar"><div class="pixel-v2"></div></div>
            <div class="map-node" id="node-0">開始</div>
            <div class="map-node" id="node-1">關卡 1</div>
            <div class="map-node" id="node-2">關卡 2</div>
            <div class="map-node" id="node-3">關卡 3</div>
            <div class="map-node" id="node-4">關卡 4</div>
            <div class="map-node" id="node-5">關卡 5</div>
            <div class="map-node" id="node-6">最終考驗</div>
        </div>
        <button class="btn" id="map-action-btn" style="margin-top: 60px; font-size: 16px;" onclick="startCurrentLevel()">進入</button>
    </div>

    <div id="battle-screen" class="screen">
        <div id="battle-stats">
            <div class="stat-bar" id="p-score" style="color:var(--neon-green)">玩家: 0</div>
            <div class="stat-bar" id="ai-score" style="color:var(--highlight)">AI: 0</div>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div id="question-display"><h2 id="q-text">傳輸...</h2></div>
        <div id="audio-ui" style="display:none; margin-bottom: 10px;"><button class="btn" style="font-size:12px; padding:10px;" onclick="playAudio()">🔊 監聽音訊</button></div>
        <div class="options-grid" id="options-box"></div>
        <p id="feedback"></p>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="result-msg" style="font-size: 36px; color:var(--neon-green)">MISSION OK</h1>
        <div id="score-report" style="margin-bottom:40px; font-size: 24px; line-height: 2;"></div>
        <button class="btn" style="font-size: 20px;" onclick="location.reload()">重新遠征</button>
    </div>
</div>

<script>
// [ 題庫資料 RAW_QB 與邏輯完全保留 ]
const RAW_QB = {
    riddle: [{q:"一人一張口。",a:"合",w:["含","答","口"]},{q:"兩人在內。",a:"肉",w:["囚","網"]},{q:"漢字最久？",a:"朋",w:["鹏","朋"]},{q:"狗有四張口",a:"器",w:["哮","嚎"]},{q:"提包",a:"抱",w:["提","握"]},{q:"真假半",a:"值",w:["真","假"]},{q:"守門員",a:"閃",w:["門","閉"]}],
    culture: [{q:"何者是私學機構？",a:"書院",w:["精舍","國子監","太學"]},{q:"清明上河圖？",a:"物質進步",w:["明朝","北京題材","清談之風"]},{q:"過年吃水餃象徵？",a:"財富",w:["健康","團圓","平安"]},{q:"紅毛城「紅毛」指？",a:"荷蘭人",w:["西班牙人","英國人","葡萄牙人"]},{q:"台灣原生水果？",a:"楊梅",w:["香蕉","蘋果","芭樂"]}],
    idiom: [{q:"「胸有成竹」現比喻？",a:"很有把握",w:["為人正直","孤芳自賞","內心空虛"]},{q:"「洛陽紙貴」形容？",a:"文章極好",w:["韋編三絕","汗牛充棟","買櫝還珠"]},{q:"「邯鄲學步」告訴我們？",a:"模仿丟本領",w:["學習刻苦","走路姿勢","活到老"]},{q:"「一鳴驚人」主人公？",a:"楚莊王",w:["齊威王","秦始皇","漢武帝"]}],
    audio: [{q:"聽音選出小米酒連讀唸法：",a:"ㄒㄧㄠˇ ㄇㄧˊ ㄐㄧㄡˇ",w:["ㄒㄧㄠˇ ㄇㄧˇ ㄐㄧㄡˇ","ㄒㄧㄠˊ ㄇㄧˊ ㄐㄧㄡˇ","ㄒㄧㄠˊ ㄇㄧˇ ㄐㄧㄡˊ"],text:"小米酒"},{q:"聽音選出仍然正確讀音：",a:"ㄖㄥˊ ㄖㄢˊ",w:["ㄌㄥˊ ㄌㄢˊ","ㄖㄣˊ ㄖㄢˊ","ㄌㄥˊ ㄖㄢˊ"],text:"仍然"},{q:"聽音選出水彩筆唸法：",a:"ㄕㄨㄟˇ ㄘㄞˊ ㄅㄧˇ",w:["ㄕㄨㄟˇ ㄘㄞˇ ㄅㄧˇ","ㄕㄨㄟˊ ㄘㄞˊ ㄅㄧˇ","ㄕㄨㄟˊ ㄘㄞˇ ㄅㄧˇ"],text:"水彩筆"}]
};

let state = { player: 0, ai: 0, level: 0, difficulty: '', char: '', questions: [], qIdx: 0, timer: null, time: 15, nodePositions: [] };

function goToScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function selectChar(c) { state.char = c; document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected')); if(c==='學生') document.getElementById('c1').classList.add('selected'); else if(c==='助教') document.getElementById('c2').classList.add('selected'); else document.getElementById('c3').classList.add('selected'); }
function setDiff(d) { if(!state.char) return alert("請先身份確認"); state.difficulty = d; goToScreen('map-screen'); setTimeout(initMapPositions, 150); }

function initMapPositions() {
    state.nodePositions = [];
    const container = document.getElementById('map-path-container');
    const containerRect = container.getBoundingClientRect();
    for(let i=0; i<=6; i++) {
        const nodeRect = document.getElementById(`node-${i}`).getBoundingClientRect();
        state.nodePositions.push(nodeRect.left - containerRect.left + (nodeRect.width / 2) - 16); 
    }
    const avatar = document.getElementById('player-avatar');
    avatar.style.display = 'block'; avatar.style.left = state.nodePositions[0] + "px";
    updateMapUI();
}

function updateMapUI() {
    for(let i=0; i<=6; i++) {
        let node = document.getElementById(`node-${i}`);
        node.className = 'map-node' + (i < state.level ? ' completed' : (i === state.level ? ' active' : ''));
    }
    document.getElementById('map-action-btn').innerText = state.level === 0 ? "初始化" : (state.level <= 5 ? `啟動通道 ${state.level}` : "最終協定");
}

function moveAvatarToLevel(targetLevel) {
    const avatar = document.getElementById('player-avatar');
    avatar.style.left = state.nodePositions[targetLevel] + "px";
    setTimeout(() => { state.level = targetLevel; updateMapUI(); }, 1000);
}

function getRandQ(type) { const pool = RAW_QB[type]; return pool[Math.floor(Math.random() * pool.length)]; }

function startCurrentLevel() {
    if(state.level === 0) { moveAvatarToLevel(1); return; }
    state.qIdx = 0;
    if(state.level <= 5) {
        if(state.difficulty === 'easy') state.questions = [getRandQ('riddle')];
        else if(state.difficulty === 'normal') state.questions = [getRandQ(Math.random() > 0.5 ? 'culture' : 'idiom')];
        else state.questions = [getRandQ(Object.keys(RAW_QB)[Math.floor(Math.random()*4)])];
    } else {
        state.questions = [getRandQ('riddle'), getRandQ('culture'), getRandQ('idiom'), getRandQ('audio'), getRandQ('idiom')];
    }
    goToScreen('battle-screen'); renderQuestion();
}

function renderQuestion() {
    let q = state.questions[state.qIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('feedback').innerText = "";
    document.getElementById('audio-ui').style.display = q.text ? 'block' : 'none';
    if(q.text) playAudio();
    let opts = [q.a, ...q.w].sort(() => 0.5 - Math.random());
    let html = ''; opts.forEach(o => html += `<button class="btn" onclick="answer('${o}')">${o}</button>`);
    document.getElementById('options-box').innerHTML = html;
    startTimer();
}

function answer(pick) {
    clearInterval(state.timer);
    let q = state.questions[state.qIdx];
    let isCorrect = (pick === q.a);
    state.player += isCorrect ? Math.round((state.time/15)*1000) : 0;
    state.ai += (Math.random() > 0.4 ? Math.floor(Math.random()*200 + 400) : 0);
    document.getElementById('p-score').innerText = `玩家: ${state.player}`;
    document.getElementById('ai-score').innerText = `AI: ${state.ai}`;
    document.getElementById('feedback').innerText = isCorrect ? "解碼 OK！" : "系統錯誤 ERR：" + q.a;
    document.getElementById('feedback').style.color = isCorrect ? 'var(--neon-green)' : 'var(--highlight)';
    setTimeout(() => {
        state.qIdx++;
        if(state.qIdx < state.questions.length) renderQuestion();
        else { if(state.level < 6) { goToScreen('map-screen'); setTimeout(() => moveAvatarToLevel(state.level + 1), 600); } else showResult(); }
    }, 1500);
}

function startTimer() { clearInterval(state.timer); state.time = 15; state.timer = setInterval(() => { state.time -= 0.1; document.getElementById('timer-bar').style.width = (state.time/15*100) + "%"; if(state.time <= 0) answer(null); }, 100); }
function playAudio() { let q = state.questions[state.qIdx]; if(q.text) { let u = new SpeechSynthesisUtterance(q.text); u.lang = 'zh-TW'; u.rate = 0.8; window.speechSynthesis.speak(u); } }
function showResult() { goToScreen('result-screen'); let win = state.player >= state.ai; document.getElementById('result-msg').innerText = win ? "任務OK" : "實驗停止"; document.getElementById('score-report').innerHTML = `玩家：${state.player} 分<br> AI：${state.ai} 分`; }
</script>
</body>
</html>
