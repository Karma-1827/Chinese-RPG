<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末日華語：復古科幻 RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --dark-bg: #0a0a0a;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* CRT 掃描線效果 */
        body::before {
            content: " ";
            display: block;
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #game-container {
            width: 95%; max-width: 900px; height: 650px;
            border: 4px solid var(--neon-green);
            position: relative;
            background: #111;
            box-shadow: 0 0 25px var(--neon-green);
            padding: 30px;
            box-sizing: border-box;
        }

        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 20px; text-shadow: 2px 2px var(--neon-pink); margin-bottom: 30px; }
        
        .btn {
            background: transparent; color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 12px 24px; margin: 10px;
            cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 12px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }

        /* 線性地圖介面 */
        #map-path {
            display: flex; align-items: center; justify-content: space-between;
            width: 90%; margin-top: 50px; position: relative;
        }
        .map-node {
            width: 80px; height: 40px; border: 2px solid var(--neon-blue);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; background: rgba(0,0,0,0.8); position: relative; z-index: 2;
        }
        .map-node.active { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }
        .map-node.completed { border-color: var(--neon-green); color: var(--neon-green); }
        .path-line {
            position: absolute; top: 50%; left: 0; height: 2px;
            background: #444; width: 100%; z-index: 1; transform: translateY(-50%);
        }
        #path-progress {
            position: absolute; top: 50%; left: 0; height: 3px;
            background: var(--neon-green); width: 0%; z-index: 1; transform: translateY(-50%);
            transition: width 1s ease;
        }

        /* 戰鬥介面 */
        #battle-stats { width: 100%; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stat-bar { width: 45%; border: 1px solid var(--neon-pink); padding: 8px; font-size: 14px; }
        #timer-container { width: 100%; height: 10px; border: 1px solid #444; margin: 15px 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--neon-green); transition: width 0.1s linear; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; }
        
        /* 角色卡片樣式 */
        .char-box { display: flex; gap: 20px; margin-bottom: 30px; }
        .char-card {
            border: 2px solid var(--neon-blue); padding: 15px; cursor: pointer; width: 140px; transition: 0.3s;
        }
        .char-card.selected { background: var(--neon-blue); color: black; transform: scale(1.1); }

    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>數位華語：末日戰線</h1>
        <button class="btn" onclick="goToScreen('char-select')">INITIALIZE SYSTEM</button>
    </div>

    <div id="char-select" class="screen">
        <h3>選擇你的數位身份</h3>
        <div class="char-box">
            <div class="char-card" id="c1" onclick="selectChar('學生')">學生<br><small>智力+10</small></div>
            <div class="char-card" id="c2" onclick="selectChar('助教')">助教<br><small>技術+30</small></div>
            <div class="char-card" id="c3" onclick="selectChar('老師')">老師<br><small>經驗+50</small></div>
        </div>
        <h3>選擇挑戰難度</h3>
        <div style="display:flex">
            <button class="btn" onclick="setDiff('easy')">簡單《字謎》</button>
            <button class="btn" onclick="setDiff('normal')">普通《文化/成語》</button>
            <button class="btn" onclick="setDiff('hard')">困難《綜合混戰》</button>
        </div>
    </div>

    <div id="map-screen" class="screen">
        <h1 id="map-title">系統路徑規劃</h1>
        <div id="map-path">
            <div class="path-line"></div>
            <div id="path-progress"></div>
            <div class="map-node" id="node-0">開始</div>
            <div class="map-node" id="node-1">關卡 1</div>
            <div class="map-node" id="node-2">關卡 2</div>
            <div class="map-node" id="node-3">關卡 3</div>
            <div class="map-node" id="node-4">關卡 4</div>
            <div class="map-node" id="node-5">關卡 5</div>
            <div class="map-node" id="node-6">最終關卡</div>
        </div>
        <button class="btn" id="map-action-btn" style="margin-top: 80px;" onclick="startCurrentLevel()">進入節點</button>
    </div>

    <div id="battle-screen" class="screen">
        <div id="battle-stats">
            <div class="stat-bar" id="p-score">PLAYER: 0</div>
            <div class="stat-bar" id="ai-score" style="border-color: var(--neon-pink);">AI: 0</div>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <h2 id="q-text">Loading...</h2>
        <div id="audio-ui" style="display:none"><button class="btn" onclick="playAudio()">🔊 播放音訊</button></div>
        <div class="options-grid" id="options-box"></div>
        <p id="feedback" style="margin-top:20px; font-weight:bold;"></p>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="result-msg">SESSION ENDED</h1>
        <div id="score-report" style="margin-bottom:30px"></div>
        <button class="btn" onclick="location.reload()">REBOOT</button>
    </div>
</div>

<script>
// --- 題庫資料 (沿用並擴充) ---
const QB = {
    riddle: [
        {q:"一人一張口。",a:"合",w:["含","答","口"]}, {q:"兩人在內。",a:"肉",w:["內","囚","網"]},
        {q:"哪個漢字要寫最久？",a:"朋",w:["友","好","鵬"]}, {q:"一隻狗有四張口。",a:"器",w:["哮","嚎","囂"]},
        {q:"太陽的兒子。",a:"星",w:["旦","晨","昇"]}, {q:"一月七日。",a:"脂",w:["月","日","肪"]}
    ],
    culture: [
        {q:"宋代以後主要的私學機構？",a:"書院",w:["精舍","國子監","太學"]},
        {q:"「穿針乞巧」與哪個節日有關？",a:"七夕節",w:["端午","元宵","中秋"]},
        {q:"北京故宮又稱？",a:"紫禁城",w:["紫雲城","紅牆城","金鑾殿"]}
    ],
    idiom: [
        {q:"「胸有成竹」比喻？",a:"很有把握",w:["為人正直","孤芳自賞","內心空虛"]},
        {q:"「破釜沉舟」主角是？",a:"項羽",w:["劉邦","韓信","諸葛亮"]}
    ],
    audio: [
        {q:"聽音選出『小米酒』正確變調：", a:"ㄒㄧㄠˇ ㄇㄧˊ ㄐㄧㄡˇ", w:["ㄒㄧㄠˇ ㄇㄧˇ ㄐㄧㄡˇ", "ㄒㄧㄠˊ ㄇㄧˊ ㄐㄧㄡˇ"], text:"小米酒"},
        {q:"聽音選出『仍然』正確讀音：", a:"ㄖㄥˊ ㄖㄢˊ", w:["ㄌㄥˊ ㄌㄢˊ", "ㄖㄣˊ ㄖㄢˊ"], text:"仍然"}
    ]
};

let state = {
    player: 0, ai: 0, 
    level: 0, // 0: Start, 1-5: Levels, 6: Final
    difficulty: '', char: '',
    questions: [], // 儲存當前關卡的題目(本設計中每關一題，Level 6 有五題)
    qIdx: 0, timer: null, time: 15
};

function goToScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function selectChar(c) {
    state.char = c;
    document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected'));
    if(c==='學生') document.getElementById('c1').classList.add('selected');
    if(c==='助教') document.getElementById('c2').classList.add('selected');
    if(c==='老師') document.getElementById('c3').classList.add('selected');
}

function setDiff(d) {
    if(!state.char) return alert("請先選擇身份");
    state.difficulty = d;
    updateMap();
    goToScreen('map-screen');
}

function updateMap() {
    for(let i=0; i<=6; i++) {
        let node = document.getElementById(`node-${i}`);
        node.className = 'map-node' + (i < state.level ? ' completed' : (i === state.level ? ' active' : ''));
    }
    document.getElementById('path-progress').style.width = (state.level / 6 * 100) + "%";
    document.getElementById('map-action-btn').innerText = state.level === 0 ? "開始掃描" : (state.level <= 5 ? `進入關卡 ${state.level}` : "進入最後綜合關卡");
}

function startCurrentLevel() {
    if(state.level === 0) { // 從開始按下
        state.level = 1;
        updateMap();
        setTimeout(startCurrentLevel, 800);
        return;
    }

    // 準備關卡題目
    state.qIdx = 0;
    if(state.level <= 5) {
        state.questions = [getRandQ(state.difficulty)];
    } else {
        // 第六關：綜合題 (5題)
        state.questions = [getRandQ('easy'), getRandQ('normal'), getRandQ('normal'), getRandQ('hard'), getRandQ('hard')];
    }
    
    goToScreen('battle-screen');
    renderQuestion();
}

function getRandQ(diff) {
    let pool = [];
    if(diff === 'easy') pool = QB.riddle;
    else if(diff === 'normal') pool = [...QB.culture, ...QB.idiom];
    else pool = [...QB.riddle, ...QB.culture, ...QB.idiom, ...QB.audio];
    return pool[Math.floor(Math.random()*pool.length)];
}

function renderQuestion() {
    let q = state.questions[state.qIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('feedback').innerText = "";
    document.getElementById('audio-ui').style.display = q.text ? 'block' : 'none';
    if(q.text) playAudio();

    let opts = [q.a, ...q.w].sort(() => 0.5 - Math.random());
    let html = '';
    opts.forEach(o => html += `<button class="btn" onclick="answer('${o}')">${o}</button>`);
    document.getElementById('options-box').innerHTML = html;
    
    startTimer();
}

function startTimer() {
    clearInterval(state.timer);
    state.time = 15;
    state.timer = setInterval(() => {
        state.time -= 0.1;
        document.getElementById('timer-bar').style.width = (state.time/15*100) + "%";
        if(state.time <= 0) answer(null);
    }, 100);
}

function answer(pick) {
    clearInterval(state.timer);
    let q = state.questions[state.qIdx];
    let isCorrect = (pick === q.a);
    
    // 玩家得分
    let score = isCorrect ? Math.round((state.time/15)*1000) : 0;
    state.player += score;
    
    // AI 得分模擬 (隨機 400-800)
    let aiGain = Math.random() > 0.3 ? Math.floor(Math.random()*400 + 400) : 0;
    state.ai += aiGain;
    
    document.getElementById('p-score').innerText = `PLAYER: ${state.player}`;
    document.getElementById('ai-score').innerText = `AI: ${state.ai}`;
    document.getElementById('feedback').innerText = isCorrect ? "解碼成功！" : "系統錯誤！正確答案是: " + q.a;
    document.getElementById('feedback').style.color = isCorrect ? 'var(--neon-green)' : 'red';

    setTimeout(() => {
        state.qIdx++;
        if(state.qIdx < state.questions.length) {
            renderQuestion();
        } else {
            if(state.level < 6) {
                state.level++;
                updateMap();
                goToScreen('map-screen');
            } else {
                showResult();
            }
        }
    }, 1500);
}

function playAudio() {
    let q = state.questions[state.qIdx];
    if(q.text) {
        let u = new SpeechSynthesisUtterance(q.text);
        u.lang = 'zh-TW'; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
}

function showResult() {
    goToScreen('result-screen');
    let win = state.player >= state.ai;
    document.getElementById('result-msg').innerText = win ? "勝利：數據守護成功" : "失敗：AI 侵蝕系統";
    document.getElementById('score-report').innerHTML = `玩家總分：${state.player} <br> AI 總分：${state.ai}`;
}
</script>
</body>
</html>
