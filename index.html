<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>末日華語：像素勇者闖關 RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --dark-bg: #0a0a0a;
            --node-size: 80px;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            margin: 0; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* --- CRT 掃描線效果 (沿用) --- */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        #game-container {
            width: 95%; max-width: 950px; height: 680px;
            border: 4px solid var(--neon-green); position: relative;
            background: #111; box-shadow: 0 0 25px var(--neon-green);
            padding: 30px; box-sizing: border-box;
        }

        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 18px; text-shadow: 2px 2px var(--neon-pink); margin-bottom: 20px; }
        
        .btn {
            background: transparent; color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 12px 24px; margin: 10px;
            cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 10px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 15px var(--neon-green); }

        /* --- 角色與難度選擇 (沿用) --- */
        .char-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .char-card { border: 2px solid var(--neon-blue); padding: 10px; cursor: pointer; width: 130px; transition: 0.3s; }
        .char-card.selected { background: var(--neon-blue); color: black; transform: scale(1.05); }

        /* ============================================================
           線性地圖與像素小人移動 (修改核心)
           ============================================================ */
        #map-screen { position: relative; }

        #map-path-container {
            width: 90%; height: 200px; /* 給小人走動的空間 */
            position: relative; margin-top: 50px;
            display: flex; align-items: flex-end; justify-content: space-between;
        }

        .path-line-base {
            position: absolute; bottom: 30px; left: 0; width: 100%; height: 4px;
            background: #444; z-index: 1;
        }

        /* 像素節點 */
        .map-node {
            width: var(--node-size); height: 50px;
            border: 3px solid var(--neon-blue); background: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold;
            position: relative; z-index: 5; margin-bottom: 5px; /* 貼在地平線上 */
        }
        .map-node.completed { border-color: var(--neon-green); color: var(--neon-green); }
        .map-node.active { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }
        
        /* CSS 繪製像素小人 (簡單的 8-bit 勇者感) */
        #player-avatar {
            width: 32px; height: 48px;
            position: absolute; bottom: 34px; /* 立在地平線上 */
            z-index: 10;
            transition: left 1s ease-in-out; /* 關鍵：線性移動動畫 */
            display: none; /* 初始隱藏 */
        }

        /* 小人的像素身體 */
        .avatar-head { width: 16px; height: 16px; background: #edc9af; position: absolute; top: 0; left: 8px; border: 2px solid #000;}
        .avatar-body { width: 24px; height: 20px; background: #3366ff; position: absolute; top: 18px; left: 4px; border: 2px solid #000; border-radius: 4px;}
        .avatar-leg { width: 6px; height: 10px; background: #000; position: absolute; bottom: 0; border: 1px solid #fff;}
        .avatar-leg.L { left: 8px; }
        .avatar-leg.R { right: 8px; }

        /* 走動時的簡單腿部動畫 */
        @keyframes legWalk {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        #player-avatar.walking .avatar-leg.L { animation: legWalk 0.3s infinite; }
        #player-avatar.walking .avatar-leg.R { animation: legWalk 0.3s infinite 0.15s; }

        /* --- 戰鬥畫面 (沿用) --- */
        #battle-stats { width: 100%; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .stat-bar { width: 45%; border: 1px solid var(--neon-pink); padding: 8px; font-size: 14px; }
        #timer-container { width: 100%; height: 10px; border: 1px solid #444; margin: 15px 0; }
        #timer-bar { width: 100%; height: 100%; background: var(--neon-green); transition: width 0.1s linear; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; }

    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>數位華語：像素勇者闖關</h1>
        <button class="btn" onclick="goToScreen('char-select')">INITIALIZE SYSTEM</button>
    </div>

    <div id="char-select" class="screen">
        <h3>選擇你的數位身份</h3>
        <div class="char-box">
            <div class="char-card" id="c1" onclick="selectChar('學生')">學生<br><small>智力+10</small></div>
            <div class="char-card" id="c2" onclick="selectChar('助教')">助教<br><small>技術+30</small></div>
            <div class="char-card" id="c3" onclick="selectChar('老師')">老師<br><small>經驗+50</small></div>
        </div>
        <h3>選擇挑戰難度</h3>
        <div style="display:flex">
            <button class="btn" onclick="setDiff('easy')">簡單《字謎》</button>
            <button class="btn" onclick="setDiff('normal')">普通《文化/成語》</button>
            <button class="btn" onclick="setDiff('hard')">困難《綜合混戰》</button>
        </div>
    </div>

    <div id="map-screen" class="screen">
        <h1 id="map-title">勇者前進路徑</h1>
        
        <div id="map-path-container">
            <div class="path-line-base"></div>
            
            <div id="player-avatar">
                <div class="avatar-head"></div>
                <div class="avatar-body"></div>
                <div class="avatar-leg L"></div>
                <div class="avatar-leg R"></div>
            </div>

            <div class="map-node" id="node-0">開始</div>
            <div class="map-node" id="node-1">關卡 1</div>
            <div class="map-node" id="node-2">關卡 2</div>
            <div class="map-node" id="node-3">關卡 3</div>
            <div class="map-node" id="node-4">關卡 4</div>
            <div class="map-node" id="node-5">關卡 5</div>
            <div class="map-node" id="node-6">最終關卡</div>
        </div>

        <button class="btn" id="map-action-btn" style="margin-top: 50px;" onclick="startCurrentLevel()">進入節點</button>
    </div>

    <div id="battle-screen" class="screen">
        <div id="battle-stats">
            <div class="stat-bar" id="p-score">PLAYER: 0</div>
            <div class="stat-bar" id="ai-score" style="border-color: var(--neon-pink);">AI: 0</div>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        <h2 id="q-text">Loading...</h2>
        <div id="audio-ui" style="display:none"><button class="btn" onclick="playAudio()">🔊 播放音訊</button></div>
        <div class="options-grid" id="options-box"></div>
        <p id="feedback" style="margin-top:15px; font-weight:bold;"></p>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="result-msg">SESSION ENDED</h1>
        <div id="score-report" style="margin-bottom:30px"></div>
        <button class="btn" onclick="location.reload()">REBOOT</button>
    </div>
</div>

<script>
// --- 題庫資料 (沿用) ---
const QB = {
    riddle: [{q:"一人一張口。",a:"合",w:["含","答"]},{q:"兩人在內。",a:"肉",w:["囚","網"]}],
    culture: [{q:"私學機構？",a:"書院",w:["國子監","太學"]}],
    idiom: [{q:"「胸有成竹」比喻？",a:"很有把握",w:["為人正直","內心空虛"]}],
    audio: [{q:"選出『小米酒』正確變調：", a:"ㄒㄧㄠˇ ㄇㄧˊ ㄐㄧㄡˇ", w:["ㄒㄧㄠˇ ㄇㄧˇ ㄐㄧㄡˇ", "ㄒㄧㄠˊ ㄇㄧˊ ㄐㄧㄡˇ"], text:"小米酒"}]
};

let state = {
    player: 0, ai: 0, 
    level: 0, // 0: Start, 1-5: Levels, 6: Final
    difficulty: '', char: '',
    questions: [], qIdx: 0, timer: null, time: 15,
    nodePositions: [] // 儲存節點的座標，用於小人移動
};

function goToScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function selectChar(c) {
    state.char = c;
    document.querySelectorAll('.char-card').forEach(card => card.classList.remove('selected'));
    if(c==='學生') document.getElementById('c1').classList.add('selected');
    if(c==='助教') document.getElementById('c2').classList.add('selected');
    if(c==='老師') document.getElementById('c3').classList.add('selected');
}

function setDiff(d) {
    if(!state.char) return alert("請先選擇身份");
    state.difficulty = d;
    goToScreen('map-screen');
    // 延遲獲取座標，確保 DOM 已渲染
    setTimeout(initMapPositions, 100);
}

// ============================================================
// 地圖與動畫邏輯 (修改核心)
// ============================================================

function initMapPositions() {
    // 獲取所有節點相對於容器的左側座標
    state.nodePositions = [];
    const containerRect = document.getElementById('map-path-container').getBoundingClientRect();
    for(let i=0; i<=6; i++) {
        const nodeRect = document.getElementById(`node-${i}`).getBoundingClientRect();
        // 將坐標對齊到節點中心
        state.nodePositions.push(nodeRect.left - containerRect.left + (nodeRect.width / 2) - 16); 
    }
    
    // 初始化小人位置在「開始」
    const avatar = document.getElementById('player-avatar');
    avatar.style.display = 'block';
    avatar.style.left = state.nodePositions[0] + "px";
    updateMapUI();
}

function updateMapUI() {
    for(let i=0; i<=6; i++) {
        let node = document.getElementById(`node-${i}`);
        // 藍色表示當前關卡，綠色表示已完成
        node.className = 'map-node' + (i < state.level ? ' completed' : (i === state.level ? ' active' : ''));
    }
    document.getElementById('map-action-btn').innerText = 
        state.level === 0 ? "開始掃描" : (state.level <= 5 ? `進入關卡 ${state.level}` : "進入綜合關卡");
}

// 播放人物走動動畫並更新位置
function moveAvatarToLevel(targetLevel, callback) {
    const avatar = document.getElementById('player-avatar');
    avatar.classList.add('walking'); // 啟動腿部動畫
    
    // 設定目標 X 座標
    avatar.style.left = state.nodePositions[targetLevel] + "px";
    
    // 等待 CSS transition 完成 (1秒)
    setTimeout(() => {
        avatar.classList.remove('walking'); // 停止腿部動畫
        state.level = targetLevel;
        updateMapUI();
        if(callback) callback();
    }, 1000);
}

function startCurrentLevel() {
    if(state.level === 0) { // 點擊「開始掃描」
        moveAvatarToLevel(1); // 自動走到關卡1
        return;
    }

    // 準備關卡題目
    state.qIdx = 0;
    state.questions = (state.level <= 5) ? [getRandQ(state.difficulty)] : 
                      [getRandQ('easy'), getRandQ('normal'), getRandQ('hard')]; // 第六關3題即可
    
    goToScreen('battle-screen');
    renderQuestion();
}

// --- 戰鬥邏輯 (沿用，僅修改回地圖部分) ---

function answer(pick) {
    clearInterval(state.timer);
    let q = state.questions[state.qIdx];
    let isCorrect = (pick === q.a);
    state.player += isCorrect ? Math.round((state.time/15)*1000) : 0;
    state.ai += (Math.random() > 0.4 ? Math.floor(Math.random()*300 + 300) : 0); // AI更簡單
    
    document.getElementById('p-score').innerText = `PLAYER: ${state.player}`;
    document.getElementById('ai-score').innerText = `AI: ${state.ai}`;
    document.getElementById('feedback').innerText = isCorrect ? "解碼成功！" : "錯誤！答案: " + q.a;
    document.getElementById('feedback').style.color = isCorrect ? 'var(--neon-green)' : 'red';

    setTimeout(() => {
        state.qIdx++;
        if(state.qIdx < state.questions.length) {
            renderQuestion();
        } else {
            // 當前關卡結束，處理自動前進
            if(state.level < 6) {
                // 1. 跳回地圖畫面
                goToScreen('map-screen');
                // 2. 自動「走」到下一關
                setTimeout(() => {
                    moveAvatarToLevel(state.level + 1);
                }, 500); // 延遲一下再走，視覺效果更好
            } else {
                showResult();
            }
        }
    }, 1200);
}

// --- 輔助函數 (沿用) ---
function getRandQ(diff) {
    let pool = diff === 'easy' ? QB.riddle : (diff === 'normal' ? [...QB.culture, ...QB.idiom] : [...QB.riddle, ...QB.culture, ...QB.idiom, ...QB.audio]);
    return pool[Math.floor(Math.random()*pool.length)];
}
function renderQuestion() {
    let q = state.questions[state.qIdx];
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('feedback').innerText = "";
    document.getElementById('audio-ui').style.display = q.text ? 'block' : 'none';
    if(q.text) playAudio();
    let opts = [q.a, ...q.w].sort(() => 0.5 - Math.random());
    let html = ''; opts.forEach(o => html += `<button class="btn" onclick="answer('${o}')">${o}</button>`);
    document.getElementById('options-box').innerHTML = html;
    startTimer();
}
function startTimer() { clearInterval(state.timer); state.time = 15; state.timer = setInterval(() => { state.time -= 0.1; document.getElementById('timer-bar').style.width = (state.time/15*100) + "%"; if(state.time <= 0) answer(null); }, 100); }
function playAudio() { let q = state.questions[state.qIdx]; if(q.text) { let u = new SpeechSynthesisUtterance(q.text); u.lang = 'zh-TW'; u.rate = 0.8; window.speechSynthesis.speak(u); } }
function showResult() { goToScreen('result-screen'); let win = state.player >= state.ai; document.getElementById('result-msg').innerText = win ? "勝利：數據守護成功" : "失敗：AI 侵蝕系統"; document.getElementById('score-report').innerHTML = `玩家：${state.player} <br> AI：${state.ai}`; }
</script>
</body>
</html>
